# Continuous integration for the Maxi80 Skip app.
#
# Goal: catch build/test/transpile errors BEFORE the manual release process
# (see the Makefile `release`/`publish-*` targets, which are NOT run here).
# This workflow deliberately contains NO release, fastlane, signing, upload, or
# emulator steps — it only compiles and tests the app.
#
# The two platforms split across two runners because this app has no Linux-HOST
# code path (the Apple side needs CoreGraphics/SwiftUI; the Android side is
# reached only via the Skip transpile / Swift-for-Android cross-compile):
#
#   macOS job  — Apple side: `xcodebuild build` (unsigned) + `swift test`.
#   Linux job  — Android side: `skip android build` + gradle (cross-compile).
name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "website/**"
      - "docs/**"
      - "**/*.md"
  pull_request:
    paths-ignore:
      - "website/**"
      - "docs/**"
      - "**/*.md"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Apple side: build the Xcode app (unsigned) + run the native test suite.
  # ---------------------------------------------------------------------------
  macos:
    name: macOS (xcodebuild, unsigned)
    # macos-26 ships Xcode 26, which this project assumes (Xcode 26+).
    runs-on: macos-26
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      # Configuration.plist is git-ignored; seed it from the template so the
      # build finds it. Tests use mocked networking, so placeholder values are
      # fine (real values are only needed at runtime on a device).
      - name: Seed Configuration.plist
        run: cp Sources/Maxi80/Resources/Configuration.plist.template Sources/Maxi80/Resources/Configuration.plist

      - name: Set up Skip toolchain
        uses: skiptools/actions/setup-skip@v1
        with:
          # Android is built on the Linux job; this job stays Apple-only, so it
          # does not need the (slow-to-install) Swift Android SDK.
          install-swift-android-sdk: false

      - name: Versions
        run: |
          swift --version
          xcodebuild -version
          skip --version || true

      # SKIP_ACTION=none disables the Xcode "Run skip gradle" build phase so this
      # job builds only the Apple app and needs no Android toolchain. It MUST be
      # passed as an xcodebuild command-line build setting (not a process env
      # var): Darwin/Maxi80.xcconfig sets SKIP_ACTION=build, and an xcconfig
      # value is injected into the script phase's environment where it would
      # otherwise override an inherited env var. A command-line build setting
      # outranks the xcconfig. Signing is fully disabled (no certs in CI).
      - name: Build (macOS, unsigned)
        run: |
          xcodebuild build \
            -project Darwin/Maxi80.xcodeproj \
            -scheme "Maxi80 App" \
            -destination "platform=macOS,arch=arm64" \
            -configuration Debug \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            SKIP_ACTION=none \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS=""

      # The Xcode "Maxi80 App" scheme has an empty test action (the test suites
      # live in the SwiftPM package, not the .xcodeproj), so `xcodebuild test`
      # against it would run ZERO tests. This project's blessed test gate is
      # `swift test` (the Makefile `test` target), which runs natively on macOS.
      - name: Test (macOS)
        run: make test

  # ---------------------------------------------------------------------------
  # Android side: Skip transpile + Swift-for-Android cross-compile + gradle.
  # This runs on Linux (the Android build does not need macOS) and catches
  # transpiler errors and Kotlin/gradle compile errors before release.
  # ---------------------------------------------------------------------------
  linux:
    name: Linux (Android build)
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      # Android SDK 36 requires Java 21; the ubuntu-24.04 runner defaults to
      # Java 17. JAVA_HOME_21_X64 is a runner environment variable, so it must
      # be resolved in a step (not the job-level env: context, which is
      # evaluated before the runner shell exists).
      - name: Select Java 21
        run: echo "JAVA_HOME=${JAVA_HOME_21_X64}" >> "$GITHUB_ENV"

      - name: Seed Configuration.plist
        run: cp Sources/Maxi80/Resources/Configuration.plist.template Sources/Maxi80/Resources/Configuration.plist

      - name: Set up Skip toolchain
        uses: skiptools/actions/setup-skip@v1
        with:
          # The native Fuse modules cross-compile to Android, so the
          # Swift-Android SDK is required here.
          install-swift-android-sdk: true

      - name: Versions
        run: |
          swift --version
          skip checkup || true

      # `make build-android` runs `skip android build` (the Swift -> Kotlin
      # transpile + Swift-for-Android cross-compile) then `gradle assembleDebug`
      # (compiles the generated Kotlin/Android project). Reused from the Makefile
      # so CI matches the local dev flow exactly.
      - name: Android build (transpile + gradle)
        run: make build-android
