# Continuous integration for the Maxi80 Skip app.
#
# Goal: catch build/test/transpile errors BEFORE the manual release process
# (see the Makefile `release`/`publish-*` targets, which are NOT run here).
# This workflow deliberately contains NO fastlane, signing, upload, or emulator
# steps — it only compiles and tests the app. It DOES build the minified
# `release` variant (to exercise R8), but signs nothing and uploads nothing.
#
# Everything runs on macOS runners, where the full toolchain (Xcode, the Swift
# toolchain, and `xcrun` used by Skip's gradle prebuild) is native:
#
#   - xcodebuild build (unsigned)  — the Apple app compiles.
#   - swift test                   — the native Swift test suite passes.
#   - skip android build + gradle  — the Android transpile + Kotlin build works.
#   - gradle assembleRelease (R8)  — minification keeps the JNI-bridged classes.
name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "website/**"
      - "docs/**"
      - "**/*.md"
  pull_request:
    paths-ignore:
      - "website/**"
      - "docs/**"
      - "**/*.md"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: macOS build + test (unsigned)
    # macos-26 ships Xcode 26, which this project assumes (Xcode 26+).
    runs-on: macos-26
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      # --- Caches -------------------------------------------------------------
      # The first Android build downloads ~1GB of Gradle + Compose/media3/AGP
      # artifacts; SwiftPM resolves and caches the Skip package graph. Caching
      # both cuts several minutes off subsequent runs. Keys hash the files that
      # determine each cache's contents, with a looser restore-key fallback so a
      # near-miss still seeds from the newest prior cache.
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('Android/gradle/wrapper/gradle-wrapper.properties', 'Android/**/*.gradle.kts', 'Android/**/*.toml', 'Skip.env') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: swiftpm-${{ runner.os }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-

      # Configuration.plist is git-ignored; seed it from the template so the
      # build finds it. Tests use mocked networking, so placeholder values are
      # fine (real values are only needed at runtime on a device).
      - name: Seed Configuration.plist
        run: cp Sources/Maxi80/Resources/Configuration.plist.template Sources/Maxi80/Resources/Configuration.plist

      - name: Set up Skip toolchain
        uses: skiptools/actions/setup-skip@v1
        with:
          # Needed for `skip android build` (Swift-for-Android cross-compile).
          install-swift-android-sdk: true

      - name: Versions
        run: |
          swift --version
          xcodebuild -version
          skip checkup || true

      # SKIP_ACTION=none disables the Xcode "Run skip gradle" build phase so this
      # step builds only the Apple app (the Android build is exercised in its own
      # step below). It MUST be a command-line build setting, not a process env
      # var: Darwin/Maxi80.xcconfig sets SKIP_ACTION=build, and the xcconfig
      # value is injected into the script phase's environment where it would
      # otherwise win. A command-line build setting outranks the xcconfig.
      # Signing is fully disabled (no certs in CI).
      - name: Build Apple app (unsigned)
        run: |
          xcodebuild build \
            -project Darwin/Maxi80.xcodeproj \
            -scheme "Maxi80 App" \
            -destination "platform=macOS,arch=arm64" \
            -configuration Debug \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            SKIP_ACTION=none \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS=""

      # The Xcode "Maxi80 App" scheme has an empty test action (the test suites
      # live in the SwiftPM package, not the .xcodeproj), so `xcodebuild test`
      # against it would run ZERO tests. This project's blessed test gate is
      # `swift test` (the Makefile `test` target), which runs natively on macOS.
      - name: Test
        run: make test

      # `make build-android` runs `skip android build` (Swift -> Kotlin
      # transpile + Swift-for-Android cross-compile) then `gradle assembleDebug`
      # (compiles the generated Kotlin/Android project). Reused from the Makefile
      # so CI matches the local dev flow exactly.
      - name: Build Android (transpile + gradle)
        run: make build-android

      # The DEBUG build above does NOT run R8, so it can't catch minification
      # bugs. This step builds the minified `release` variant (isMinifyEnabled +
      # isShrinkResources) to run R8, then asserts the JNI-bridged classes
      # survived it. Those classes are reached only via `Class.forName` from the
      # native Swift bridge, a reference R8 can't see — so without a keep rule it
      # strips/renames them and the app dies on launch with ClassNotFoundException
      # (a `try!` in the bridge traps -> SIGABRT). This ONLY reproduces in a
      # minified build; debug builds hid the bug until it shipped to Play beta.
      # No keystore in CI -> release falls back to the debug signing key, which is
      # fine here (we never upload). Assertion reads R8's own mapping.txt, so it
      # needs no extra tooling and is deterministic (no emulator).
      - name: Build Android release (R8) + verify bridged classes survive
        run: |
          cd Android && gradle --warning-mode none -x lint assembleRelease
          cd ..
          MAPPING=.build/Android/app/outputs/mapping/release/mapping.txt
          if [ ! -f "$MAPPING" ]; then
            echo "::error::R8 mapping not found at $MAPPING — did assembleRelease run with minification?"
            exit 1
          fi
          # A kept class maps to ITSELF ("orig -> orig:"). If R8 renamed or removed
          # it, the arrow points at an obfuscated name (or the entry is absent).
          if ! grep -qE '^maxi80\.services\.PlatformEnvironment -> maxi80\.services\.PlatformEnvironment:' "$MAPPING"; then
            echo "::error::maxi80.services.PlatformEnvironment was stripped/renamed by R8 — add a keep rule to Android/app/proguard-rules.pro"
            grep -E '^maxi80\.services\.' "$MAPPING" || echo "(no maxi80.services.* classes in mapping)"
            exit 1
          fi
          echo "OK: maxi80.services.PlatformEnvironment survived R8 unrenamed."
